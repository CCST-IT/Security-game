<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Security+ Acronym Trainer</title>

  <!-- Dynamic theme loader -->
  <link id="theme-link" rel="stylesheet" href="style.css">

  <style>
    /* Optional inline styling for the theme button */
    #theme-btn {
      display: block;
      margin: 20px auto 10px auto;
      padding: 10px 20px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      transition: 0.2s;
    }

    #theme-btn:hover {
      background: #4338ca;
    }
  </style>
</head>

<body>

  <!-- Theme Switcher -->
  <button id="theme-btn">Switch Theme</button>

  <h1>Security+ Acronym Trainer</h1>
<div id="scoreboard">
  <p>Score: <span id="score">0</span></p>
  <p>High Score: <span id="highscore">0</span></p>
  <p>Streak: <span id="streak">0</span></p>
</div>

  <div id="game-container">
    <p id="acronym-display">Loading...</p>

    <input id="user-input" placeholder="Type the full expansion..." />

    <button onclick="checkAnswer()">Submit</button>

    <div id="result"></div>
  </div>

  <!-- Load acronym dataset -->
  <script src="acronyms.js"></script>

  <!-- Game Logic -->
  <script>
    /* -------------------------
       THEME SWITCHER LOGIC
       ------------------------- */

    const themes = [
      "style.css",          // default dark
      "style-neon.css",     // neon
      "style-rainbow.css"   // rainbow
    ];

    let currentTheme = 0;

    document.getElementById("theme-btn").addEventListener("click", () => {
      currentTheme = (currentTheme + 1) % themes.length;
      document.getElementById("theme-link").href = themes[currentTheme];
    });

    /* -------------------------
       GAME LOGIC
       ------------------------- */

    let current;

    function pickRandom() {
      current = ACRONYMS[Math.floor(Math.random() * ACRONYMS.length)];
      document.getElementById("acronym-display").textContent = current.acronym;
      document.getElementById("user-input").value = "";
      document.getElementById("result").textContent = "";
    }

    function checkAnswer() {
      const user = document.getElementById("user-input").value.trim().toLowerCase();
      const correct = current.expansion.join(" ").toLowerCase();

      if (user === correct) {
        document.getElementById("result").textContent = "Correct!";
        document.getElementById("result").style.color = "#22c55e";
      } else {
        document.getElementById("result").textContent = "Incorrect — " + correct;
        document.getElementById("result").style.color = "#ef4444";
      }

      setTimeout(pickRandom, 1500);
    }

    pickRandom();
  </script>

</body>
</html>
